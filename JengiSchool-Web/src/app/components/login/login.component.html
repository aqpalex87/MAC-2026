<div class="login-page">
  <div class="login-backdrop"></div>
  <div class="login-card auth-form-dark">
    <div class="brand-logo">
      <span class="brand-text">JengiSchool</span>
      <p class="brand-sub">Análisis Cuantitativo MAC</p>
    </div>
    <h4>Hola</h4>
    <h6 class="subtitle">Inicia sesión para continuar</h6>
    <form class="login-form" (ngSubmit)="iniciarSesion()">
      <div class="field">
        <label for="codigoUsuario">Usuario</label>
        <input
          id="codigoUsuario"
          type="text"
          class="control"
          [(ngModel)]="codigoUsuario"
          name="codigoUsuario"
          autocomplete="username"
          placeholder="Ingrese su usuario"
        />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          class="control"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          placeholder="Ingrese su contraseña"
        />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Validando…' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>

<p-dialog
  [(visible)]="sedeModalVisible"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="false"
  [style]="{ width: '28rem' }"
  header="Seleccione sede"
  styleClass="sede-login-dialog"
>
  <div class="sede-modal-content">
    <p class="sede-modal-subtitle">Empresa: <strong>{{ empresaLogin?.nombre || '-' }}</strong></p>
    <label for="idSedeSelect">Sede</label>
    <select id="idSedeSelect" class="control browser-default" [(ngModel)]="idSede" name="idSedeSelect">
      <option [ngValue]="null">Seleccione sede</option>
      <option *ngFor="let s of sedes" [ngValue]="s.idSede">{{ s.nombre }}</option>
    </select>
  </div>
  <ng-template pTemplate="footer">
    <button type="button" class="btn-primary sede-confirm-btn" (click)="confirmarSede()">Continuar</button>
  </ng-template>
</p-dialog>
