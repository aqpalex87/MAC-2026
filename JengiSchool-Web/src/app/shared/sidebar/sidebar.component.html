<ul (click)="clickSlideOut()" id="slide-out" class="sidenav collapsible">
    <li>
        <div class="user-view center-align">
            <div class="background">
                <img src="assets/img/logo-interna.png" alt="login" class="responsive-img logo-mini">                
                <img src="assets/img/logo-home.png" alt="login" class="responsive-img logo">
            </div>
        </div>
    </li>
    <li>
        <div class="divider"></div>
    </li>
    <li class="" *ngFor="let modulo of SecurityModulos" routerLinkActive="active">
        <div class="collapsible-header" tabindex="0" *ngIf="filtrarTieneOpciones(modulo.IdOpcion) > 0">
            <i class="material-icons">{{ modulo.TipoIconoDescripcion }}</i>
            <div>
                {{ modulo.NombreOpcion | uppercase }}
            </div>
            <i class="material-icons keyboard_arrow_down">keyboard_arrow_down</i>
        </div>
        <div class="collapsible-body" *ngFor="let opc of filtrarOpcionesPorModulo(modulo.IdOpcion)">
            <span class="cssurl">
                <a [routerLink]="obtenerRutaOpcion(opc)">{{ opc.DescripcionAplicacion | uppercase}}</a>
            </span>
        </div>
    </li>    
  </ul>
