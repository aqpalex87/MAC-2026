<div class="section no-padding">
  <div class="row col s12 no-mar-bot">
    <div class="section no-mar-bot">
      <div class="col s12 m12 l12 empresa-header">
        <h1 class="title">Mantenimiento de Empresas</h1>
      </div>
    </div>
  </div>
</div>

<div class="empresa-toolbar">
  <div class="search-wrap">
    <i class="pi pi-search"></i>
    <input pInputText type="text" [(ngModel)]="busqueda" placeholder="Buscar por nombre" (keyup.enter)="buscar()" />
    <button pButton type="button" icon="pi pi-search" label="Buscar" class="btn-search" (click)="buscar()"></button>
    <button pButton type="button" icon="pi pi-times" class="btn-clear" (click)="limpiarBusqueda()"></button>
  </div>
  <button pButton type="button" label="Agregar" icon="pi pi-plus" class="btn-add" (click)="abrirNuevo()"></button>
</div>

<p-table
  [value]="empresas"
  styleClass="p-datatable-sm p-datatable-gridlines empresa-table"
  [paginator]="true"
  [rows]="rows"
  [totalRecords]="totalRows"
  [lazy]="true"
  [loading]="loading"
  [rowsPerPageOptions]="[10, 20, 50]"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords}"
  (onLazyLoad)="onLazyLoad($event)"
>
  <ng-template pTemplate="header">
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>RUC</th>
      <th>Estado</th>
      <th class="text-center">Opciones</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.idEmpresa }}</td>
      <td>{{ item.nombre }}</td>
      <td>{{ item.ruc || '-' }}</td>
      <td>
        <span class="status-badge" [ngClass]="item.activo ? 'active' : 'inactive'">
          {{ item.activo ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
      <td class="text-center actions">
        <button pButton type="button" icon="pi pi-pencil" class="btn-action edit" (click)="editar(item)"></button>
        <button pButton type="button" icon="pi pi-trash" class="btn-action delete" (click)="eliminar(item)"></button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="5">No hay registros para mostrar.</td>
    </tr>
  </ng-template>
</p-table>

<p-dialog
  [(visible)]="modalVisible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '38rem' }"
  [header]="editando ? 'Editar empresa' : 'Agregar empresa'"
>
  <form [formGroup]="form" class="empresa-form">
    <div class="field">
      <label>Nombre *</label>
      <input pInputText type="text" formControlName="nombre" />
    </div>
    <div class="field">
      <label>RUC</label>
      <input pInputText type="text" formControlName="ruc" />
    </div>
    <div class="field checkbox-field">
      <p-checkbox [binary]="true" formControlName="activo"></p-checkbox>
      <label>Activo</label>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <button pButton type="button" label="Cancelar" icon="pi pi-times" class="btn-clear" (click)="modalVisible = false"></button>
    <button pButton type="button" label="Guardar" icon="pi pi-save" class="btn-save" (click)="guardar()"></button>
  </ng-template>
</p-dialog>
